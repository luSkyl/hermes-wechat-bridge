name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install package
        run: python -m pip install -e .[dev]
      - name: Lint
        run: python -m ruff check .
      - name: Run tests
        run: python -m pytest
      - name: Compile modules
        run: python -m compileall bridge simulator
      - name: Doctor smoke
        run: python -m bridge.cli doctor --config examples/minimal/config.yaml
      - name: Simulator smoke
        run: python -m bridge.cli simulate --config examples/minimal/config.yaml --event simulator/sample_events/text.json

  package:
    name: Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install build tools
        run: python -m pip install build twine
      - name: Build package
        run: python -m build
      - name: Check package
        run: python -m twine check dist/*
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
