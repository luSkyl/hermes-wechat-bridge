name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install build tools
        run: python -m pip install build twine
      - name: Run tests
        run: |
          python -m pip install -e .[dev]
          python -m pytest
      - name: Build package
        run: python -m build
      - name: Check package
        run: python -m twine check dist/*
      - name: Build distribution bundle
        run: |
          python - <<'PY'
          import os
          import zipfile
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          asset_dir = Path("release-assets")
          asset_dir.mkdir(exist_ok=True)
          archive = asset_dir / f"hermes-wechat-distribution-{tag}.zip"
          include_roots = [
              "bridge",
              "distribution",
              "docs",
              "examples",
              "schemas",
              "scripts",
              "simulator",
              "tests",
          ]
          include_files = [
              "README.md",
              "CHANGELOG.md",
              "RELEASE.md",
              "ROADMAP.md",
              "LICENSE",
              "pyproject.toml",
          ]
          skip_parts = {".git", ".pytest_cache", ".ruff_cache", "__pycache__", "dist", "build"}
          with zipfile.ZipFile(archive, "w", zipfile.ZIP_DEFLATED) as zf:
              for filename in include_files:
                  path = Path(filename)
                  if path.exists():
                      zf.write(path, path.as_posix())
              for root_name in include_roots:
                  root = Path(root_name)
                  if not root.exists():
                      continue
                  for path in root.rglob("*"):
                      if path.is_dir() or any(part in skip_parts for part in path.parts):
                          continue
                      zf.write(path, path.as_posix())
          print(f"created {archive}")
          PY
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*
            release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: vars.PUBLISH_TO_PYPI == 'true' && !contains(github.ref_name, '-')
    environment:
      name: pypi
      url: https://pypi.org/project/hermes-wechat-bridge/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Build package
        run: |
          python -m pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
