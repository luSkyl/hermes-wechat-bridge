name: Feature request
description: Suggest a focused improvement
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope guard
      options:
        - label: This keeps WeChat runtime logic inside `hermes-wechat-bridge`.
        - label: This does not require Hermes Web UI to own callback/delivery logic.
        - label: This can be tested with simulator or contract tests.
