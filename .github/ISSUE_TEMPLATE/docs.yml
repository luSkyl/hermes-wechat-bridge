name: Documentation issue
description: Report missing, confusing, or outdated docs
title: "docs: "
labels: ["documentation", "needs-triage"]
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is confusing or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
