bridge:
  name: hermes-wechat-bridge
  environment: docker

wechat:
  token: dev-token
  dry_run: true
  max_reply_chars: 1800

hermes:
  mode: mock
  endpoint: http://host.docker.internal:8765/messages
  timeout_seconds: 20

runtime:
  dedupe_ttl_seconds: 300
  retry_attempts: 2
  retry_backoff_seconds: 0.1
  request_timeout_seconds: 20
  service_api_token: dev-service-token
